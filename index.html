<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenClaw 控制台</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 15px;
            color: #fff;
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
            padding-top: 10px;
        }
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { opacity: 0.7; font-size: 0.8rem; }
        
        /* 实时系统监控 */
        .monitor-section {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .monitor-title {
            font-size: 0.75rem;
            color: #00d4ff;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.65rem;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .metric-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .metric-row:last-child { margin-bottom: 0; }
        .metric-label {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        .metric-bar {
            width: 60%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .metric-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .metric-fill.cpu { background: linear-gradient(90deg, #00d4ff, #7b2cbf); }
        .metric-fill.mem { background: linear-gradient(90deg, #4ade80, #22c55e); }
        .metric-fill.disk { background: linear-gradient(90deg, #facc15, #eab308); }
        .metric-value {
            font-size: 0.75rem;
            font-weight: bold;
            min-width: 40px;
            text-align: right;
        }
        
        /* 使用统计 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 5px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-label {
            font-size: 0.6rem;
            opacity: 0.7;
            margin-top: 2px;
        }
        
        /* 任务队列 */
        .task-queue {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .queue-title {
            font-size: 0.75rem;
            color: #00d4ff;
        }
        .queue-count {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 3px solid;
        }
        .task-item:last-child { margin-bottom: 0; }
        .task-item.running { border-left-color: #00d4ff; }
        .task-item.pending { border-left-color: #facc15; }
        .task-item.completed { border-left-color: #4ade80; }
        .task-icon { font-size: 1.2rem; margin-right: 10px; }
        .task-info { flex: 1; }
        .task-name { font-size: 0.8rem; font-weight: 500; }
        .task-meta { font-size: 0.65rem; opacity: 0.6; margin-top: 2px; }
        .task-status {
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 0.6rem;
        }
        .status-running { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .status-pending { background: rgba(250,204,21,0.2); color: #facc15; }
        .status-completed { background: rgba(74,222,128,0.2); color: #4ade80; }
        
        /* 工作流和 Agents */
        .section { margin-bottom: 15px; }
        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00d4ff;
            margin-bottom: 10px;
            padding-left: 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 8px;
            color: #fff;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .btn:hover, .btn:active {
            background: rgba(255,255,255,0.1);
            border-color: #00d4ff;
            transform: translateY(-2px);
        }
        .btn-icon { font-size: 1.5rem; }
        .btn-text { text-align: center; line-height: 1.2; }
        
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 0.7rem;
            opacity: 0.5;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 OpenClaw</h1>
        <p>智能工作流控制台</p>
    </div>
    
    <!-- 使用统计 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value">8</div>
            <div class="stat-label">Agents</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">12</div>
            <div class="stat-label">任务</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">98%</div>
            <div class="stat-label">成功率</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">8h</div>
            <div class="stat-label">运行</div>
        </div>
    </div>
    
    <!-- 实时系统监控 -->
    <div class="monitor-section">
        <div class="monitor-title">
            <span>实时系统监控</span>
            <div class="live-indicator">
                <div class="live-dot"></div>
                <span>LIVE</span>
            </div>
        </div>
        <div class="metric-row">
            <span class="metric-label">CPU</span>
            <div class="metric-bar">
                <div class="metric-fill cpu" style="width: 4%"></div>
            </div>
            <span class="metric-value">4%</span>
        </div>
        <div class="metric-row">
            <span class="metric-label">内存</span>
            <div class="metric-bar">
                <div class="metric-fill mem" style="width: 14%"></div>
            </div>
            <span class="metric-value">14%</span>
        </div>
        <div class="metric-row">
            <span class="metric-label">磁盘</span>
            <div class="metric-bar">
                <div class="metric-fill disk" style="width: 27%"></div>
            </div>
            <span class="metric-value">27%</span>
        </div>
    </div>
    
    <!-- 任务队列 -->
    <div class="task-queue">
        <div class="queue-header">
            <span class="queue-title">任务队列</span>
            <span class="queue-count">3 个任务</span>
        </div>
        <div class="task-item running">
            <span class="task-icon">🔄</span>
            <div class="task-info">
                <div class="task-name">Web App 部署</div>
                <div class="task-meta">运行中 · 2分钟前</div>
            </div>
            <span class="task-status status-running">运行</span>
        </div>
        <div class="task-item pending">
            <span class="task-icon">⏳</span>
            <div class="task-info">
                <div class="task-name">飞书数据同步</div>
                <div class="task-meta">等待中 · 5分钟前</div>
            </div>
            <span class="task-status status-pending">等待</span>
        </div>
        <div class="task-item completed">
            <span class="task-icon">✅</span>
            <div class="task-info">
                <div class="task-name">Agent 菜单配置</div>
                <div class="task-meta">已完成 · 10分钟前</div>
            </div>
            <span class="task-status status-completed">完成</span>
        </div>
    </div>
    
    <!-- 工作流 -->
    <div class="section">
        <div class="section-title">工作流</div>
        <div class="grid">
            <button class="btn" onclick="sendCommand('workflow_a')">
                <span class="btn-icon">🎯</span>
                <span class="btn-text">运营活动策划</span>
            </button>
            <button class="btn" onclick="sendCommand('workflow_b')">
                <span class="btn-icon">📊</span>
                <span class="btn-text">数据诊断分析</span>
            </button>
            <button class="btn" onclick="sendCommand('workflow_c')">
                <span class="btn-icon">📝</span>
                <span class="btn-text">需求工程/PRD</span>
            </button>
            <button class="btn" onclick="sendCommand('workflow_d')">
                <span class="btn-icon">📱</span>
                <span class="btn-text">内容发布管理</span>
            </button>
        </div>
    </div>
    
    <!-- Agents -->
    <div class="section">
        <div class="section-title">专业 Agents</div>
        <div class="grid">
            <button class="btn" onclick="sendCommand('data_analyst')">
                <span class="btn-icon">🔍</span>
                <span class="btn-text">数据分析师</span>
            </button>
            <button class="btn" onclick="sendCommand('product_prd')">
                <span class="btn-icon">📋</span>
                <span class="btn-text">PRD撰写</span>
            </button>
            <button class="btn" onclick="sendCommand('operation_campaign')">
                <span class="btn-icon">📢</span>
                <span class="btn-text">运营策划</span>
            </button>
            <button class="btn" onclick="sendCommand('risk_control')">
                <span class="btn-icon">🛡️</span>
                <span class="btn-text">风险审查</span>
            </button>
            <button class="btn" onclick="sendCommand('content_publishing')">
                <span class="btn-icon">🎨</span>
                <span class="btn-text">内容发布</span>
            </button>
            <button class="btn" onclick="sendCommand('ai_content')">
                <span class="btn-icon">✨</span>
                <span class="btn-text">AI内容生成</span>
            </button>
        </div>
    </div>
    
    <div class="footer">
        OpenClaw v1.0 | Ubuntu 24.04 | Kimi K2.5
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#1a1a2e');
        tg.setBackgroundColor('#1a1a2e');
        
        function sendCommand(cmd) {
            tg.showPopup({
                title: '执行: ' + cmd,
                message: '正在处理...',
                buttons: [{type: 'ok'}]
            });
            tg.sendData(cmd);
            setTimeout(() => tg.close(), 600);
        }
        
        // 模拟实时数据更新
        setInterval(() => {
            // 这里可以添加实时数据获取逻辑
        }, 5000);
    </script>
</body>
</html>
