<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenClaw 控制台</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 15px;
            color: #fff;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 10px;
        }
        .header h1 {
            font-size: 1.6rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        .header p { opacity: 0.7; font-size: 0.85rem; }
        
        /* 系统状态卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-label {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 4px;
        }
        
        .section { margin-bottom: 20px; }
        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00d4ff;
            margin-bottom: 12px;
            padding-left: 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 15px 10px;
            color: #fff;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .btn:hover, .btn:active {
            background: rgba(255,255,255,0.1);
            border-color: #00d4ff;
            transform: translateY(-2px);
        }
        .btn-icon { font-size: 1.8rem; }
        .btn-text { text-align: center; line-height: 1.2; font-size: 0.75rem; }
        .btn-full {
            grid-column: span 2;
            flex-direction: row;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #00d4ff20, #7b2cbf20);
        }
        
        /* 最近任务 */
        .task-list {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .task-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.8rem;
        }
        .task-item:last-child { border-bottom: none; }
        .task-status {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.65rem;
        }
        .status-done { background: rgba(74,222,128,0.2); color: #4ade80; }
        .status-pending { background: rgba(250,204,21,0.2); color: #facc15; }
        
        /* 快捷链接 */
        .quick-links {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        .quick-link {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 8px 15px;
            font-size: 0.75rem;
            white-space: nowrap;
            cursor: pointer;
        }
        
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 0.7rem;
            opacity: 0.5;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 OpenClaw</h1>
        <p>智能工作流控制台</p>
    </div>
    
    <!-- 系统状态 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value">🟢</div>
            <div class="stat-label">系统在线</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">Kimi</div>
            <div class="stat-label">当前模型</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">8h+</div>
            <div class="stat-label">运行时间</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">27%</div>
            <div class="stat-label">磁盘使用</div>
        </div>
    </div>
    
    <!-- 快捷链接 -->
    <div class="section">
        <div class="section-title">快捷操作</div>
        <div class="quick-links">
            <div class="quick-link" onclick="sendCommand('status')">📊 状态</div>
            <div class="quick-link" onclick="sendCommand('model')">🤖 模型</div>
            <div class="quick-link" onclick="sendCommand('agents')">👥 Agents</div>
            <div class="quick-link" onclick="sendCommand('help')">❓ 帮助</div>
        </div>
    </div>
    
    <!-- 最近任务 -->
    <div class="section">
        <div class="section-title">最近任务</div>
        <div class="task-list">
            <div class="task-item">
                <span>🎛️ Web App 部署</span>
                <span class="task-status status-done">完成</span>
            </div>
            <div class="task-item">
                <span>🤖 Agent 菜单配置</span>
                <span class="task-status status-done">完成</span>
            </div>
            <div class="task-item">
                <span>📊 飞书数据获取</span>
                <span class="task-status status-pending">待处理</span>
            </div>
        </div>
    </div>
    
    <!-- 工作流 -->
    <div class="section">
        <div class="section-title">工作流</div>
        <div class="grid">
            <button class="btn" onclick="sendCommand('workflow_a')">
                <span class="btn-icon">🎯</span>
                <span class="btn-text">运营活动策划</span>
            </button>
            <button class="btn" onclick="sendCommand('workflow_b')">
                <span class="btn-icon">📊</span>
                <span class="btn-text">数据诊断分析</span>
            </button>
            <button class="btn" onclick="sendCommand('workflow_c')">
                <span class="btn-icon">📝</span>
                <span class="btn-text">需求工程/PRD</span>
            </button>
            <button class="btn" onclick="sendCommand('workflow_d')">
                <span class="btn-icon">📱</span>
                <span class="btn-text">内容发布管理</span>
            </button>
        </div>
    </div>
    
    <!-- Agents -->
    <div class="section">
        <div class="section-title">专业 Agents</div>
        <div class="grid">
            <button class="btn" onclick="sendCommand('data_analyst')">
                <span class="btn-icon">🔍</span>
                <span class="btn-text">数据分析师</span>
            </button>
            <button class="btn" onclick="sendCommand('product_prd')">
                <span class="btn-icon">📋</span>
                <span class="btn-text">PRD撰写</span>
            </button>
            <button class="btn" onclick="sendCommand('operation_campaign')">
                <span class="btn-icon">📢</span>
                <span class="btn-text">运营策划</span>
            </button>
            <button class="btn" onclick="sendCommand('risk_control')">
                <span class="btn-icon">🛡️</span>
                <span class="btn-text">风险审查</span>
            </button>
            <button class="btn" onclick="sendCommand('content_publishing')">
                <span class="btn-icon">🎨</span>
                <span class="btn-text">内容发布</span>
            </button>
            <button class="btn" onclick="sendCommand('ai_content')">
                <span class="btn-icon">✨</span>
                <span class="btn-text">AI内容生成</span>
            </button>
        </div>
    </div>
    
    <button class="btn btn-full" onclick="sendCommand('agents')">
        <span class="btn-icon">📋</span>
        <span class="btn-text">查看所有 Agents</span>
    </button>
    
    <div class="footer">
        OpenClaw v1.0 | Ubuntu 24.04 | 8 Agents Ready
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#1a1a2e');
        tg.setBackgroundColor('#1a1a2e');
        
        function sendCommand(cmd) {
            tg.showPopup({
                title: '执行: ' + cmd,
                message: '正在处理...',
                buttons: [{type: 'ok'}]
            });
            tg.sendData(cmd);
            setTimeout(() => tg.close(), 600);
        }
    </script>
</body>
</html>
