<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenClaw 控制台</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .header p { opacity: 0.7; font-size: 0.9rem; }
        .section { margin-bottom: 25px; }
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00d4ff;
            margin-bottom: 15px;
            padding-left: 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 18px 12px;
            color: #fff;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .btn:hover, .btn:active {
            background: rgba(255,255,255,0.1);
            border-color: #00d4ff;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,212,255,0.2);
        }
        .btn-icon { font-size: 2rem; }
        .btn-text { text-align: center; line-height: 1.3; }
        .btn-full {
            grid-column: span 2;
            flex-direction: row;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #00d4ff20, #7b2cbf20);
        }
        .status-bar {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 15px;
            margin-top: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }
        .status-item:last-child { margin-bottom: 0; }
        .badge {
            background: rgba(0,212,255,0.2);
            color: #00d4ff;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .badge.green { background: rgba(74,222,128,0.2); color: #4ade80; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 OpenClaw</h1>
        <p>智能工作流控制台</p>
    </div>
    
    <div class="section">
        <div class="section-title">工作流</div>
        <div class="grid">
            <button class="btn" onclick="sendCommand('workflow_a')">
                <span class="btn-icon">🎯</span>
                <span class="btn-text">运营活动策划</span>
            </button>
            <button class="btn" onclick="sendCommand('workflow_b')">
                <span class="btn-icon">📊</span>
                <span class="btn-text">数据诊断分析</span>
            </button>
            <button class="btn" onclick="sendCommand('workflow_c')">
                <span class="btn-icon">📝</span>
                <span class="btn-text">需求工程/PRD</span>
            </button>
            <button class="btn" onclick="sendCommand('workflow_d')">
                <span class="btn-icon">📱</span>
                <span class="btn-text">内容发布管理</span>
            </button>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">专业 Agents</div>
        <div class="grid">
            <button class="btn" onclick="sendCommand('data_analyst')">
                <span class="btn-icon">🔍</span>
                <span class="btn-text">数据分析师</span>
            </button>
            <button class="btn" onclick="sendCommand('product_prd')">
                <span class="btn-icon">📋</span>
                <span class="btn-text">PRD撰写</span>
            </button>
            <button class="btn" onclick="sendCommand('operation_campaign')">
                <span class="btn-icon">📢</span>
                <span class="btn-text">运营策划</span>
            </button>
            <button class="btn" onclick="sendCommand('risk_control')">
                <span class="btn-icon">🛡️</span>
                <span class="btn-text">风险审查</span>
            </button>
            <button class="btn" onclick="sendCommand('content_publishing')">
                <span class="btn-icon">🎨</span>
                <span class="btn-text">内容发布</span>
            </button>
            <button class="btn" onclick="sendCommand('ai_content')">
                <span class="btn-icon">✨</span>
                <span class="btn-text">AI内容生成</span>
            </button>
        </div>
    </div>
    
    <button class="btn btn-full" onclick="sendCommand('agents')">
        <span class="btn-icon">📋</span>
        <span class="btn-text">查看所有 Agents</span>
    </button>
    
    <div class="status-bar">
        <div class="status-item">
            <span>系统状态</span>
            <span class="badge green">● 在线</span>
        </div>
        <div class="status-item">
            <span>当前模型</span>
            <span class="badge">Kimi K2.5</span>
        </div>
        <div class="status-item">
            <span>执行环境</span>
            <span class="badge">OpenClaw-Ubuntu</span>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#1a1a2e');
        tg.setBackgroundColor('#1a1a2e');
        
        function sendCommand(cmd) {
            tg.showPopup({
                title: '启动 ' + cmd,
                message: '正在启动对应的工作流...',
                buttons: [{type: 'ok'}]
            });
            tg.sendData(cmd);
            setTimeout(() => tg.close(), 800);
        }
    </script>
</body>
</html>
