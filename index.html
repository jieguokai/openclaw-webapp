<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenClaw 控制台</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            min-height: 100vh;
            padding: 15px;
            color: #fff;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 10px;
        }
        .header h1 {
            font-size: 1.5rem;
            color: #00d4ff;
        }
        .header p { opacity: 0.7; font-size: 0.8rem; }
        
        /* 使用统计 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .stat-card:hover, .stat-card:active {
            background: #21262d;
            border-color: #00d4ff;
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #00d4ff;
        }
        .stat-label {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        
        /* 快捷命令面板 */
        .command-section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 0.8rem;
            color: #00d4ff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .command-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .cmd-btn {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 15px 10px;
            color: #fff;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .cmd-btn:hover, .cmd-btn:active {
            background: #00d4ff20;
            border-color: #00d4ff;
        }
        .cmd-icon { font-size: 1.6rem; }
        .cmd-text { text-align: center; font-size: 0.75rem; }
        
        /* 实时系统监控 */
        .monitor-section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .monitor-title {
            font-size: 0.8rem;
            color: #00d4ff;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .metric-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            align-items: center;
        }
        .metric-row:last-child { margin-bottom: 0; }
        .metric-label { font-size: 0.85rem; opacity: 0.8; width: 50px; }
        .metric-bar {
            flex: 1;
            height: 10px;
            background: #30363d;
            border-radius: 5px;
            overflow: hidden;
            margin: 0 12px;
        }
        .metric-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s ease;
        }
        .metric-fill.cpu { background: #00d4ff; }
        .metric-fill.mem { background: #4ade80; }
        .metric-fill.disk { background: #facc15; }
        .metric-value {
            font-size: 0.8rem;
            font-weight: bold;
            min-width: 45px;
            text-align: right;
        }
        
        /* 任务队列 */
        .task-queue {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .queue-title { font-size: 0.8rem; color: #00d4ff; }
        .queue-count {
            background: #1e3a5f;
            color: #00d4ff;
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #0d1117;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 3px solid;
        }
        .task-item:last-child { margin-bottom: 0; }
        .task-item.running { border-left-color: #00d4ff; }
        .task-item.pending { border-left-color: #facc15; }
        .task-item.completed { border-left-color: #4ade80; }
        .task-icon { font-size: 1.3rem; margin-right: 12px; }
        .task-info { flex: 1; }
        .task-name { font-size: 0.85rem; font-weight: 500; }
        .task-meta { font-size: 0.7rem; opacity: 0.6; margin-top: 3px; }
        .task-status {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.65rem;
        }
        .status-running { background: #1e3a5f; color: #00d4ff; }
        .status-pending { background: #3a3a1e; color: #facc15; }
        .status-completed { background: #1e3a2f; color: #4ade80; }
        
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            opacity: 0.5;
            border-top: 1px solid #30363d;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 OpenClaw</h1>
        <p>智能工作流控制台</p>
    </div>
    
    <!-- 使用统计 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value">8</div>
            <div class="stat-label">Agents</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">12</div>
            <div class="stat-label">任务</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">98%</div>
            <div class="stat-label">成功率</div>
        </div>
        <div class="stat-card">
            <div class="stat-value">8h</div>
            <div class="stat-label">运行</div>
        </div>
    </div>
    
    <!-- 工作流命令 -->
    <div class="command-section">
        <div class="section-title">🎯 工作流</div>
        <div class="command-grid">
            <button class="cmd-btn" onclick="sendCmd('workflow_a')">
                <span class="cmd-icon">🎯</span>
                <span class="cmd-text">运营活动策划</span>
            </button>
            <button class="cmd-btn" onclick="sendCmd('workflow_b')">
                <span class="cmd-icon">📊</span>
                <span class="cmd-text">数据诊断分析</span>
            </button>
            <button class="cmd-btn" onclick="sendCmd('workflow_c')">
                <span class="cmd-icon">📝</span>
                <span class="cmd-text">需求工程/PRD</span>
            </button>
            <button class="cmd-btn" onclick="sendCmd('workflow_d')">
                <span class="cmd-icon">📱</span>
                <span class="cmd-text">内容发布管理</span>
            </button>
        </div>
    </div>
    
    <!-- Agent 命令 -->
    <div class="command-section">
        <div class="section-title">🤖 专业 Agents</div>
        <div class="command-grid">
            <button class="cmd-btn" onclick="sendCmd('data_analyst')">
                <span class="cmd-icon">🔍</span>
                <span class="cmd-text">数据分析师</span>
            </button>
            <button class="cmd-btn" onclick="sendCmd('product_prd')">
                <span class="cmd-icon">📋</span>
                <span class="cmd-text">PRD撰写</span>
            </button>
            <button class="cmd-btn" onclick="sendCmd('operation_campaign')">
                <span class="cmd-icon">📢</span>
                <span class="cmd-text">运营策划</span>
            </button>
            <button class="cmd-btn" onclick="sendCmd('risk_control')">
                <span class="cmd-icon">🛡️</span>
                <span class="cmd-text">风险审查</span>
            </button>
            <button class="cmd-btn" onclick="sendCmd('content_publishing')">
                <span class="cmd-icon">🎨</span>
                <span class="cmd-text">内容发布</span>
            </button>
            <button class="cmd-btn" onclick="sendCmd('ai_content')">
                <span class="cmd-icon">✨</span>
                <span class="cmd-text">AI内容生成</span>
            </button>
        </div>
    </div>
    
    <!-- 实时系统监控 -->
    <div class="monitor-section">
        <div class="monitor-title">
            <span>实时系统监控</span>
            <div class="live-indicator">
                <div class="live-dot"></div>
                <span>LIVE</span>
            </div>
        </div>
        <div class="metric-row">
            <span class="metric-label">CPU</span>
            <div class="metric-bar">
                <div class="metric-fill cpu" style="width: 4%"></div>
            </div>
            <span class="metric-value">4%</span>
        </div>
        <div class="metric-row">
            <span class="metric-label">内存</span>
            <div class="metric-bar">
                <div class="metric-fill mem" style="width: 14%"></div>
            </div>
            <span class="metric-value">14%</span>
        </div>
        <div class="metric-row">
            <span class="metric-label">磁盘</span>
            <div class="metric-bar">
                <div class="metric-fill disk" style="width: 27%"></div>
            </div>
            <span class="metric-value">27%</span>
        </div>
    </div>
    
    <!-- 任务队列 -->
    <div class="task-queue">
        <div class="queue-header">
            <span class="queue-title">任务队列</span>
            <span class="queue-count">3 个任务</span>
        </div>
        <div class="task-item running">
            <span class="task-icon">🔄</span>
            <div class="task-info">
                <div class="task-name">Web App 更新</div>
                <div class="task-meta">运行中 · 刚刚</div>
            </div>
            <span class="task-status status-running">运行</span>
        </div>
        <div class="task-item pending">
            <span class="task-icon">⏳</span>
            <div class="task-info">
                <div class="task-name">数据分析任务</div>
                <div class="task-meta">等待中 · 5分钟前</div>
            </div>
            <span class="task-status status-pending">等待</span>
        </div>
        <div class="task-item completed">
            <span class="task-icon">✅</span>
            <div class="task-info">
                <div class="task-name">Agent 菜单配置</div>
                <div class="task-meta">已完成 · 10分钟前</div>
            </div>
            <span class="task-status status-completed">完成</span>
        </div>
    </div>
    
    <div class="footer">
        OpenClaw v1.0 | Ubuntu 24.04 | Kimi K2.5 | 8 Agents Ready
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#0d1117');
        tg.setBackgroundColor('#0d1117');
        
        function sendCmd(cmd) {
            // 显示加载提示
            tg.showPopup({
                title: '🚀 启动 ' + cmd,
                message: '正在发送命令到 OpenClaw...',
                buttons: [{type: 'ok'}]
            });
            
            // 发送数据回 Telegram
            tg.sendData(cmd);
            
            // 关闭 Web App
            setTimeout(() => {
                tg.close();
            }, 500);
        }
    </script>
</body>
</html>
